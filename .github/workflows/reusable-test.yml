name: Reusable Tests

on:
  workflow_call:
    inputs:
      test-pattern:
        description: "go test package pattern"
        required: false
        default: "./..."
        type: string
    outputs:
      coverage:
        description: "Coverage percentage"
        value: ${{ jobs.test.outputs.coverage }}

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      coverage: ${{ steps.coverage.outputs.coverage }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Show Go version
        run: go version

      # ─────────────────────────────
      # Run tests (fail-safe)
      # ─────────────────────────────
      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail

          go test \
            -race \
            -covermode=atomic \
            -coverpkg=./... \
            -coverprofile=coverage.out \
            -v \
            ${{ inputs.test-pattern }} \
            2>&1 | tee test-output.log

      # ─────────────────────────────
      # Validate coverage
      # ─────────────────────────────
      - name: Validate coverage file
        shell: bash
        run: |
          set -euo pipefail
          test -s coverage.out || {
            echo "coverage.out is missing or empty"
            exit 1
          }

      # ─────────────────────────────
      # Extract coverage (robust)
      # ─────────────────────────────
      - name: Extract coverage
        id: coverage
        shell: bash
        run: |
          set -euo pipefail

          LINE="$(go tool cover -func=coverage.out | grep '^total:')"
          test -n "$LINE" || {
            echo "Failed to extract total coverage"
            exit 1
          }

          COV="$(echo "$LINE" | awk '{print $3}')"
          test -n "$COV" || {
            echo "Coverage value is empty"
            exit 1
          }

          echo "coverage=$COV" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COV"

      # ─────────────────────────────
      # Upload artifacts
      # ─────────────────────────────
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          if-no-files-found: error
          retention-days: 30

      - name: Upload test log
        uses: actions/upload-artifact@v4
        with:
          name: test-log-${{ github.run_id }}
          path: test-output.log
          if-no-files-found: error
          retention-days: 14
