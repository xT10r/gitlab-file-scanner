name: Reusable Tests

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version to use"
        required: false
        default: "1.26"
        type: string
      test-pattern:
        description: "Test pattern (go test ./...)"
        required: false
        default: "./tests/..."
        type: string
    outputs:
      coverage:
        description: "Coverage percentage"
        value: ${{ jobs.test.outputs.coverage }}

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      coverage: ${{ steps.coverage.outputs.coverage }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        id: test
        run: |
          go test -race -coverprofile=coverage.out -v ${{ inputs.test-pattern }} 2>&1 | tee test-output.log

      - name: Extract coverage
        id: coverage
        run: |
          if [ -f coverage.out ]; then
            COV=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
            echo "coverage=${COV}%" >> "$GITHUB_OUTPUT"
            echo "Coverage: ${COV}%"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: coverage-report-${{ github.job }}
          path: coverage.out
          retention-days: 30
