name: CI

on:
  push:
    branches: [develop, main]
    tags: ["v*"]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Show Go version
        run: go version

      - name: Verify module files are tidy
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code -- go.mod go.sum || {
            echo "go.mod/go.sum are not tidy. Run 'go mod tidy'."
            exit 1
          }

      - name: Verify module cache integrity
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Build sanity check
        run: go build ./cmd/main.go

      - name: Check license headers
        run: make license-check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          args: --timeout=5m ./...

  test:
    name: Test
    needs: [lint]
    uses: ./.github/workflows/reusable-test.yml
    with:
      test-pattern: "./..."

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Show Go version
        run: go version

      - name: Run govulncheck
        shell: bash
        run: |
          set -euo pipefail
          GOBIN="$RUNNER_TEMP/bin"
          mkdir -p "$GOBIN"
          echo "$GOBIN" >> "$GITHUB_PATH"
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, security]

    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail

          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi

          OUT="gitlab-file-scanner-${GOOS}-${GOARCH}${EXT}"

          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "$OUT" \
            ./cmd

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitlab-file-scanner-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gitlab-file-scanner-*
          if-no-files-found: error
          retention-days: 7